[mmu_led_effect bb_mmu_white_breathing]
layers:       breathing 4 0 top (0,1,0)

[mmu_led_effect bb_mmu_red_fast]
layers:       breathing 0.6 0 top (1,0,0)

[mmu_led_effect bb_mmu_white_fast]
layers:       breathing 0.6 0 top (0,1,0)

[mmu_led_effect bb_mmu_red_blink]
layers:       blink 1 0 top (1,0,0)

[mmu_led_effect bb_mmu_white_blink]
layers:       blink 1 0 top (0,1,0)

[mmu_led_effect bb_mmu_red_static]
layers:       static 0 0 top (1,0,0)

[mmu_led_effect bb_mmu_white_static]
layers:       static 0 0 top (0,1,0)

[mmu_led_effect bb_mmu_white_dim]
layers:       static 0 0 top (0,0.3,0)

[mmu_led_effect bb_mmu_pink_static]
layers:       static 0 0 top (1,0.3,0)

