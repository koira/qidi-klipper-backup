[temperature_sensor box1_env]
sensor_type: AHT2X # if it fails, use AHT10
i2c_bus: i2c3
#i2c_software_scl_pin = mcu_box1:PA8
#i2c_software_sda_pin = mcu_box1:PC9
i2c_mcu: mmu
i2c_address: 56
aht10_report_time: 5

[heater_generic box1_heater]
heater_pin: mmu:PA3
sensor_type: temperature_combined
sensor_list: temperature_sensor box1_env
combination_method: mean
maximum_deviation: 100
min_temp: -100
max_temp: 70
control: pid   
pid_Kp: 63.418
pid_Ki: 1.342
pid_Kd: 749.125

[verify_heater box1_heater]
max_error: 400
check_gain_time: 600

[temperature_sensor box1_heater_temp_a]
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin: mmu:PC1
min_temp: -100
max_temp: 130

[temperature_sensor box1_heater_temp_b]
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin: mmu:PC2
min_temp: -100
max_temp: 130

[heater_fan box1_heater_fan_a_box1]
pin:mmu:PA4
heater_temp: 65
kick_start_time: 0.5
heater: box1_heater
shutdown_speed:1

[heater_fan box1_heater_fan_b]
pin:mmu:PA5
heater_temp: 65
kick_start_time: 0.5
heater: box1_heater
shutdown_speed:1

[controller_fan box1_board_fan]
pin: mmu:PA6
heater: box1_heater
stepper: stepper_mmu_gear, stepper_mmu_gear_1, stepper_mmu_gear_2, stepper_mmu_gear_3

[temperature_sensor Box1_STM32]
sensor_type: temperature_mcu
sensor_mcu: mmu