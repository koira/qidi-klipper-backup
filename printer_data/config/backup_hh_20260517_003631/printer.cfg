#####################################################################
[screws_tilt_adjust] 
screw_thread: CW-M4
horizontal_move_z: 10
speed: 100
screw1: 25,38.8
screw1_name: Front left
screw2: 280,38.8
screw2_name: Front right
screw3: 280,281.2
screw3_name: Back right
screw4: 25,281.2
screw4_name: Back left

[include moonraker_obico_macros.cfg]

[include shell_command.cfg]

