spi_software_sclk_pin: PA5
spi_software_mosi_pin: PA7
spi_software_miso_pin: PA6
spi_speed: 200000
run_current: 1.06               #!# Pay attention to this value and compare it with your stock backup config
interpolate: False
stealthchop_threshold: 0
