[tmc2209 stepper_z]
uart_pin: PB7
run_current: 1.06              #!# Pay attention to this value and compare it with your stock backup config
interpolate: False
stealthchop_threshold: 9999999999
diag_pin: ^PA13
sense_resistor: 0.075


[tmc2209 stepper_z1]
uart_pin: PC5
run_current: 1.06              #!# Pay attention to this value and compare it with your stock backup config
interpolate: False
stealthchop_threshold: 9999999999
diag_pin: ^PC12
sense_resistor: 0.075

